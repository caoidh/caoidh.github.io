<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Галерея — Кондитерская</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css">
</head>
<body data-page="gallery">

<div id="kond-header"></div>

<main class="container" data-screen-label="Галерея">
  <div class="page-head">
    <div class="crumbs"><a href="index.html">Главная</a><span class="sep">/</span><span>Галерея</span></div>
    <h1>Галерея работ</h1>
    <p class="lead">Наши торты на праздниках, сезонные коллекции и закулисье мастерской. Сюда добавятся ваши реальные фотографии.</p>
  </div>

  <div class="chips" id="gal-filter" style="margin:28px 0 26px;">
    <button class="chip active" data-gf="all">Все</button>
    <button class="chip" data-gf="Торты">Торты</button>
    <button class="chip" data-gf="Капкейки">Капкейки</button>
    <button class="chip" data-gf="Эклеры">Эклеры</button>
    <button class="chip" data-gf="Зефир">Зефир</button>
    <button class="chip" data-gf="Пирожки">Пирожки</button>
    <button class="chip" data-gf="Макаруны">Макаруны</button>
  </div>

  <div class="gallery-grid" id="gallery-grid"></div>

  <section class="section" style="text-align:center;">
    <h2 style="font-size:clamp(28px,3.4vw,40px);">Хотите такой же торт?</h2>
    <p class="muted" style="margin-top:14px;max-width:500px;margin-inline:auto;">Соберём индивидуальный заказ под ваше событие — от свадьбы до дня рождения.</p>
    <div style="margin-top:26px;display:flex;gap:14px;justify-content:center;flex-wrap:wrap;">
      <a href="catalog.html" class="btn btn-primary btn-lg">В каталог</a>
      <a href="contacts.html" class="btn btn-outline btn-lg">Заказать индивидуально</a>
    </div>
  </section>
</main>

<div id="kond-footer"></div>

<script src="assets/data.js"></script>
<script src="assets/sync.js"></script>
<script src="assets/site.js"></script>
<script>
document.addEventListener('site:ready', () => {
  const K = window.KOND;
  const items = [
    { t: 'Торты',     photo: 'f/6.jpg',  big: true, l: 'Красный бархат' },
    { t: 'Капкейки',  photo: 'f/10.jpg',            l: 'Шоколадный капкейк' },
    { t: 'Торты',     photo: 'f/2.jpg',             l: 'Три шоколада' },
    { t: 'Эклеры',    photo: 'f/18.jpg',            l: 'Эклер малина' },
    { t: 'Зефир',     photo: 'f/21.jpg',            l: 'Зефир в шоколаде' },
    { t: 'Торты',     photo: 'f/4.jpg',  big: true, l: 'Торт Фрезье' },
    { t: 'Макаруны',  photo: 'f/32.jpg',            l: 'Макарун малина' },
    { t: 'Пирожки',   photo: 'f/24.jpg',            l: 'Пирожок с яблоком' },
    { t: 'Капкейки',  photo: 'f/11.jpg',            l: 'Ягодный капкейк' },
    { t: 'Эклеры',    photo: 'f/16.jpg',            l: 'Эклер фисташка' },
    { t: 'Торты',     photo: 'f/7.jpg',             l: 'Чизкейк Нью-Йорк' },
    { t: 'Макаруны',  photo: 'f/34.jpg', big: true, l: 'Набор 6 макарун' },
  ];
  const grid = document.getElementById('gallery-grid');
  function render(filter) {
    grid.innerHTML = items
      .filter(it => filter === 'all' || it.t === filter)
      .map(it => `
        <div class="gallery-item ${it.big ? 'big' : ''}">
          <img src="${it.photo}" alt="${it.l}" style="width:100%;height:100%;object-fit:cover;object-position:center;display:block;min-height:240px;">
        </div>`)
      .join('');
  }
  render('all');
  document.querySelectorAll('[data-gf]').forEach(b => b.addEventListener('click', () => {
    document.querySelectorAll('[data-gf]').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    render(b.dataset.gf);
  }));
});
</script>
</body>
</html>
