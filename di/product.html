<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Товар — Кондитерская</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css">
</head>
<body data-page="catalog">

<div id="kond-header"></div>

<main class="container" data-screen-label="Карточка товара">
  <div class="page-head" style="padding-bottom:0;">
    <div class="crumbs" id="crumbs"></div>
  </div>
  <div id="pdp-root"></div>

  <section class="section-tight" style="padding-top:20px;">
    <div class="section-head">
      <h2 style="font-size:clamp(26px,3vw,36px);">Похожие десерты</h2>
      <a href="catalog.html" class="link-arrow" id="more-link">Весь каталог</a>
    </div>
    <div class="prod-grid" id="related"></div>
  </section>
</main>

<div id="kond-footer"></div>

<script src="assets/data.js"></script>
<script src="assets/sync.js"></script>
<script src="assets/site.js"></script>
<script>
document.addEventListener('site:ready', () => {
  const K = window.KOND;
  const id = new URLSearchParams(location.search).get('id');
  const p = K.find(id) || K.products[0];
  document.title = p.name + ' — Кондитерская';

  document.getElementById('crumbs').innerHTML =
    `<a href="index.html">Главная</a><span class="sep">/</span>` +
    `<a href="catalog.html?cat=${p.cat}">${K.catName(p.cat)}</a><span class="sep">/</span><span>${p.name}</span>`;

  const hasPhoto = !!K.photos.get(p.id);
  const thumbPhs = [p.ph, 'ph-cream', p.ph, 'ph-rose'];
  document.getElementById('pdp-root').innerHTML = `
    <div class="pdp">
      <div class="pdp-gallery">
        <div class="pdp-main">${K.media(p)}</div>
        ${hasPhoto ? '' : `<div class="pdp-thumbs">
          ${thumbPhs.map((ph, i) => `<div class="pdp-thumb ${i === 0 ? 'active' : ''}" data-thumb="${ph}"><div class="ph ${ph}" style="width:100%;height:100%;"></div></div>`).join('')}
        </div>`}
      </div>
      <div class="pdp-info">
        ${p.badge ? `<span class="tag tag-soft">${p.badge}</span>` : `<span class="tag tag-soft">${K.catName(p.cat)}</span>`}
        <h1>${p.name}</h1>
        <span class="price">${K.rub(p.price)}</span>
        <p class="desc">${p.full}</p>
        <div class="pdp-specs">
          <div class="spec"><div class="l">Вес</div><div class="v">${p.weight}</div></div>
          <div class="spec"><div class="l">Хранение</div><div class="v">${p.store}</div></div>
          <div class="spec"><div class="l">Категория</div><div class="v">${K.catName(p.cat)}</div></div>
        </div>
        <div class="pdp-buy">
          <div class="qty">
            <button data-dec aria-label="Меньше">−</button>
            <span class="qval" data-qty>1</span>
            <button data-inc aria-label="Больше">+</button>
          </div>
          <button class="btn btn-primary btn-lg" data-add-cart>Добавить в корзину</button>
        </div>
        <button class="btn btn-outline btn-block" data-buy-now>Купить в один клик</button>

        <div class="pdp-accordion">
          <details open><summary>Состав</summary><div class="acc-body">${p.comp}</div></details>
          <details><summary>Хранение и подача</summary><div class="acc-body">Хранить в холодильнике при +2…+6 °C. Срок годности — ${p.store}. Достаньте десерт за 20–30 минут до подачи, чтобы он раскрыл вкус.</div></details>
          <details><summary>Доставка</summary><div class="acc-body">Доставляем по Москве в день заказа в специальной термоупаковке. Бесплатно от 3000 ₽. <a href="delivery.html" style="color:var(--rose);font-weight:600;">Подробнее о доставке →</a></div></details>
        </div>
      </div>
    </div>`;

  // gallery thumbs
  let qty = 1;
  const root = document.getElementById('pdp-root');
  root.querySelectorAll('[data-thumb]').forEach(t => t.addEventListener('click', () => {
    root.querySelectorAll('[data-thumb]').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    root.querySelector('.pdp-main .ph').className = 'ph ' + t.dataset.thumb;
    root.querySelector('.pdp-main .ph').style.cssText = 'width:100%;height:100%;';
    root.querySelector('.pdp-main .ph').setAttribute('data-label', 'фото — ' + p.name);
  }));
  root.querySelector('[data-inc]').onclick = () => { qty++; root.querySelector('[data-qty]').textContent = qty; };
  root.querySelector('[data-dec]').onclick = () => { if (qty > 1) { qty--; root.querySelector('[data-qty]').textContent = qty; } };
  root.querySelector('[data-add-cart]').onclick = () => K.cart.add(p.id, qty);
  root.querySelector('[data-buy-now]').onclick = () => { K.cart.add(p.id, qty); location.href = 'checkout.html'; };

  // related
  let rel = K.byCat(p.cat).filter(x => x.id !== p.id);
  if (rel.length < 4) rel = rel.concat(K.products.filter(x => x.cat !== p.cat && x.id !== p.id));
  rel = rel.slice(0, 4);
  const rg = document.getElementById('related');
  rg.innerHTML = rel.map(x => K.cardHTML(x)).join('');
  K.bindCards(rg);
  document.getElementById('more-link').innerHTML = 'Весь каталог ' + K.ico.arrow;
});
</script>
</body>
</html>
